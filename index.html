<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural World</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 20, 25, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            font-family: monospace; z-index: 10; cursor: pointer;
        }
        #ui h1 { color: #ffdfbb; font-size: 3rem; margin: 0 0 10px 0; }
        #ui p { color: #aaa; margin: 5px 0; font-size: 1.1rem; }

        /* NEW: WIDENED SNIPER SCOPE */
        #scope-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* Pushed transparent out to 40% (was 25%), and black out to 60% (was 45%) */
            background: radial-gradient(circle, transparent 40%, black 60%);
            pointer-events: none; z-index: 90;
        }
        /* The thin crosshair lines inside the scope */
        #scope-overlay::before {
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
            background: rgba(0, 0, 0, 0.8); transform: translateY(-50%);
        }
        #scope-overlay::after {
            content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 100%;
            background: rgba(0, 0, 0, 0.8); transform: translateX(-50%);
        }
        
        /* The Red Dot in the middle of the scope */
        #scope-dot {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: red; border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body oncontextmenu="return false;">
    
    <div id="ui">
        <h1>Infinite World</h1>
        <p style="margin-bottom: 18px;">WASD to Move &nbsp;|&nbsp; SHIFT to Sprint &nbsp;|&nbsp; SPACE to Jump</p>
        <input
            id="nameInput"
            type="text"
            maxlength="16"
            placeholder="Enter your name..."
            style="
                padding: 10px 16px; font-size: 1.1rem; font-family: monospace;
                background: #1a1a2e; color: #fff; border: 2px solid #ffdfbb;
                border-radius: 6px; outline: none; text-align: center;
                width: 220px; margin-bottom: 14px; letter-spacing: 1px;
            "
        />
        <button
            id="btn-play"
            style="
                padding: 10px 32px; font-size: 1.1rem; font-family: monospace;
                font-weight: bold; background: #3d5c3d; color: #fff;
                border: 2px solid #5a8f5a; border-radius: 6px; cursor: pointer;
                letter-spacing: 1px;
            "
        >▶ Play</button>
        <p style="margin-top: 14px; color: #666; font-size: 0.85rem;">1: Sniper &nbsp;|&nbsp; 2: Deagle &nbsp;|&nbsp; 3: Base Deployer</p>
    </div>

    <!-- NEW: Simple Tooltip -->
    <div id="hotbar" style="display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); padding: 15px 30px; color: #00ffaa; font-family: monospace; font-weight: bold; border: 2px solid #00ffaa; border-radius: 8px; z-index: 50; pointer-events: none;">
        AIM AT DIRT = Place Level 1 Base | AIM AT BASE = Upgrade!
    </div>

    <div id="settingsMenu" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 20, 25, 0.9); padding: 30px; border-radius: 12px; color: white; font-family: monospace; border: 1px solid #333; min-width: 300px; z-index: 20;">
        <h2 style="margin-top: 0; color: #ffdfbb;">World Settings</h2>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px;">Biome Scale</label>
            <select id="setting-biome" style="width: 100%; padding: 8px; background: #222; color: white; border: 1px solid #555;">
                <option value="realistic">Realistic (Massive Continents)</option>
                <option value="arcade">Arcade (Fast Transitions)</option>
            </select>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px;">Day/Night Cycle Length</label>
            <select id="setting-time" style="width: 100%; padding: 8px; background: #222; color: white; border: 1px solid #555;">
                <option value="60">1 Minute</option>
                <option value="300">5 Minutes</option>
                <option value="1200" selected>20 Minutes</option>
            </select>
        </div>
        <button id="btn-regenerate" style="width: 100%; padding: 10px; background: #8b3a3a; color: white; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px;">Regenerate World</button>
        <button id="btn-resume" style="width: 100%; padding: 10px; background: #3d5c3d; color: white; border: none; cursor: pointer; font-weight: bold;">Resume Game</button>
    </div>

    <div id="crosshair" style="display: none; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; z-index: 100;"></div>

    <div id="scope-overlay">
        <div id="scope-dot"></div>
    </div>

    <div id="hud" style="display: none; position: absolute; top: 20px; left: 20px; color: white; font-family: monospace; font-size: 1.5rem; text-shadow: 2px 2px 0 #000; z-index: 50; pointer-events: none;">
        <div id="scoreDisplay" style="color: #ffd700; margin-bottom: 5px;">Score: 0</div>
        <div id="healthDisplay" style="color: #ff4444;">Health: 100</div>
    </div>

    <div id="death-screen" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(100, 0, 0, 0.8); z-index: 200; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: monospace;">
        <h1 style="font-size: 5rem; margin: 0; color: #ff5555;">YOU DIED</h1>
        <p id="killed-by" style="margin: 8px 0 4px 0; font-size: 1.3rem; color: #ffaaaa;"></p>
        <h2 id="final-score" style="margin: 10px 0 30px 0; color: #ffd700;">Final Score: 0</h2>
        <p>Refresh the page to try again.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "simplex-noise": "https://unpkg.com/simplex-noise@4.0.1/dist/esm/simplex-noise.js"
            }
        }
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
